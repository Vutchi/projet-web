<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Upload</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="page-shell">
      <div class="card">
        <div class="brand">
          <span class="brand__mark">✍️</span>
          <div>
            <h1>Upload your text</h1>
            <p class="meta">Submit a message and review all received entries on the submissions page.</p>
          </div>
        </div>

        <form method="POST" action="/upload" class="form-grid">
          <div class="form-group">
            <label for="senderUsername">Your username (optional)</label>
            <input id="senderUsername" name="senderUsername" type="text" placeholder="Enter your username" autocomplete="username" />
          </div>

          <div class="form-group">
            <label for="text">Enter your text below</label>
            <textarea id="text" name="text" placeholder="Type or paste your text here..." required></textarea>
          </div>

          <button type="submit">Send text</button>
        </form>

        <div class="footer-links">
          <a class="button-link" href="/submissions">View all submissions</a>
          <a class="button-link" href="/chat">Open chat interface</a>
        </div>
      </div>
    </main>
  </body>
</html>
